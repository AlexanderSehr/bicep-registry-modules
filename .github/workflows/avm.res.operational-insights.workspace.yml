name: "avm.res.operational-insights.workspace"

on:
  schedule:
    - cron: "0 12 1/15 * *" # Bi-Weekly Test (on 1st & 15th of month)
  workflow_dispatch:
    inputs:
      staticValidation:
        type: boolean
        description: "Execute static validation"
        required: false
        default: true
      deploymentValidation:
        type: boolean
        description: "Execute deployment validation"
        required: false
        default: true
      removeDeployment:
        type: boolean
        description: "Remove deployed module"
        required: false
        default: true

  push:
    branches:
      - main
    paths:
      - ".github/actions/templates/avm-**"
      - ".github/workflows/avm.template.module.yml"
      - ".github/workflows/avm.res.operational-insights.workspace.yml"
      - "avm/res/operational-insights/workspace/**"
      - "avm/utilities/pipelines/**"
      - "!*/**/README.md"

env:
  modulePath: "avm/res/operational-insights/workspace"
  workflowPath: ".github/workflows/avm.res.operational-insights.workspace.yml"

concurrency:
  group: ${{ github.workflow }}

jobs:
  ###########################
  #   Initialize pipeline   #
  ###########################
  job_initialize_pipeline:
    runs-on: ubuntu-20.04
    name: "Initialize pipeline"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Run Pester tests"
        id: pester_run_step
        shell: pwsh
        run: |
          # Grouping task logs
          Write-Output '::group::Run Pester tests'

          # Load used functions
          . (Join-Path $env:GITHUB_WORKSPACE 'avm' 'utilities' 'pipelines' 'staticValidation' 'compliance' 'Set-PesterGitHubOutput.ps1')

          # Set repo root path
          $repoRootPath = $env:GITHUB_WORKSPACE

          # Set test input module path
          $moduleFolderPaths = @(Join-Path $repoRootPath "${{ inputs.modulePath }}")
          $moduleFolderPaths += (Get-ChildItem $moduleFolderPaths -Recurse -Directory -Force).FullName | Where-Object {
            (Get-ChildItem $_ -File -Depth 0 -Include @('main.json', 'main.bicep') -Force).Count -gt 0
          }

          $pathsToBuild = [System.Collections.ArrayList]@()
          $pathsToBuild += $moduleFolderPaths | ForEach-Object { Join-Path $_ 'main.bicep' }

          $builtTestFileMap = [System.Collections.Concurrent.ConcurrentDictionary[string, object]]::new()
          $pathsToBuild | ForEach-Object -Parallel {
              Write-Output "Hola 1 [$_]"
              $dict = $using:builtTestFileMap
              Write-Output "Hola 2 [$_]"
              $builtTemplate = bicep build $_ --stdout | ConvertFrom-Json -AsHashtable
              Write-Output "Hola 3 [$_]"
              $null = $dict.TryAdd($_, $builtTemplate)
              Write-Output "Hola 4 [$_]"
          }
          $builtTestFileMap

    #   - name: "Set input parameters to output variables"
